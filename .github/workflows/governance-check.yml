name: governance-check-v4

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure README exists
        run: |
          if [ ! -f README.md ]; then
            echo "Missing README"
          fi

      - name: Generate governance artifact (always runs)
        run: |
          mkdir -p governance_reports

          SCORE=0
          MAX=8

          [ -f README.md ] && SCORE=$((SCORE+1))
          grep -Fq "Hollow_House_Standards_Library" README.md && SCORE=$((SCORE+1))
          grep -Fq "SYSTEM_MAP" README.md && SCORE=$((SCORE+1))
          grep -Fq "zenodo" README.md && SCORE=$((SCORE+1))
          grep -Fq "orcid" README.md && SCORE=$((SCORE+1))
          grep -Fq "v1.3.0" README.md && SCORE=$((SCORE+1))
          [ -f CHECKSUMS.sha256 ] && SCORE=$((SCORE+1))
          [ -f AUTHORITY_BINDING.md ] && SCORE=$((SCORE+1))

          STATUS="fail"
          if [ "$SCORE" -ge 7 ]; then STATUS="pass"; fi

          cat > governance_reports/governance_audit.json << JSON
          {
            "repo": "${GITHUB_REPOSITORY}",
            "score": $SCORE,
            "max_score": $MAX,
            "status": "$STATUS"
          }
JSON

          echo "Generated artifact:"
          cat governance_reports/governance_audit.json

      - name: Upload governance artifact
        uses: actions/upload-artifact@v4
        with:
          name: governance-audit-${{ github.run_id }}
          path: governance_reports
